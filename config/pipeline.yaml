# Target Delta table (Unity Catalog or hive_metastore). Edit for your workspace.
target:
  catalog: workspace
  schema: default
  table: denormalized_sales_mart

merge_key: transactionID

# Columns written to the mart (must match sql/denormalized_sales_mart.ddl.sql column order and names).
# Names follow config/ingest.yaml column_renames; job uses build_mart_dataframe() (core path only, no media).
mart_columns:
  - transactionID
  - customerID
  - franchiseID
  - trans_timestamp
  - product
  - quantity
  - unitPrice
  - totalPrice
  - paymentMethod
  - cardNumber
  - customer_first_name
  - customer_last_name
  - customer_address
  - customer_city
  - customer_state
  - customer_postal_zip_code
  - customer_country
  - customer_continent
  - customer_email_address
  - customer_phone_number
  - customer_gender
  - franchise_name
  - franchise_city
  - franchise_district
  - franchise_zipcode
  - franchise_country
  - franchise_size
  - franchise_longitude
  - franchise_latitude
  - supplierID
  - supplier_name
  - supplier_ingredient
  - supplier_continent
  - supplier_city
  - supplier_district
  - supplier_size
  - supplier_longitude
  - supplier_latitude
  - supplier_approved

paths:
  ddl: sql/denormalized_sales_mart.ddl.sql
  expectations: config/expectations.yaml
