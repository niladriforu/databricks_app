# Declarative Automation Bundle (Databricks Asset Bundle).
# Docs: https://docs.databricks.com/en/dev-tools/bundles/index.html
#
# Uses an existing cluster (no job_clusters / new_cluster) for accounts that
# cannot create clusters. Copy a cluster ID from Compute → your cluster → URL or header.

bundle:
  name: databricks_app

variables:
  warehouse_id:
    description: Existing cluster ID (Compute → cluster page; long numeric id in URL)

targets:
  dev:
    mode: development
    default: true

resources:
  jobs:
    run_ingest_queries:
      name: run_ingest_queries
      tasks:
        - task_key: ingest_data
          existing_cluster_id: ${var.warehouse_id}
          spark_python_task:
            python_file: ./src/main.py
