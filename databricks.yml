# Declarative Automation Bundle (Databricks Asset Bundle).
# Docs: https://docs.databricks.com/en/dev-tools/bundles/index.html
#
# Serverless compute for workflows (no cluster id). Interactive "Serverless" in
# the notebook UI is separate: it does not give you a durable id for existing_cluster_id.
# See: https://docs.databricks.com/en/workflows/jobs/run-serverless-jobs.html

bundle:
  name: databricks_app

targets:
  dev:
    mode: development
    default: true

resources:
  jobs:
    run_ingest_queries:
      name: run_ingest_queries
      tasks:
        - task_key: ingest_data
          environment_key: default
          spark_python_task:
            python_file: ./src/main.py
      environments:
        - environment_key: default
          spec:
            dependencies: []
