# Declarative Automation Bundle (Databricks Asset Bundle).
# Docs: https://docs.databricks.com/en/dev-tools/bundles/index.html

bundle:
  name: databricks_app

variables:
  warehouse_id:
    description: SQL warehouse ID (from SQL Warehouses → your warehouse → Overview)

targets:
  dev:
    mode: development
    default: true

resources:
  jobs:
    run_ingest_queries:
      name: run_ingest_queries
      tasks:
        - task_key: ingest_join
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ./sql/ingest_join.sql
